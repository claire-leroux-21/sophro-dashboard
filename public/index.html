<style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;
 
const PILIER_META = {
  acquisition: { name: "Acquisition", color: "var(--acq-color)", desc: "Rendre visible — RS, UGC, SEO, GMB, pubs, partenariats visibilité" },
  conversion:  { name: "Conversion",  color: "var(--conv-color)", desc: "Transformer prospects en clients — site, pages de vente, témoignages, DM" },
  produit:     { name: "Produit",     color: "var(--prod-color)", desc: "Ce que je délivre — offres, protocoles, packs, expérience client" },
  fondation:   { name: "Fondation",   color: "var(--fond-color)", desc: "Socle long terme — admin, partenariats B2B, vision, outreach entreprise" }
};
const PILIER_ORDER = ["acquisition","conversion","produit","fondation"];
const LOCAL_KEY = "sophro-local-v3";
 
// Palette déterministe pour les chantiers (hash -> couleur stable)
const CHANTIER_PALETTE = ["#5C1A2B","#A8435A","#D97A54","#8B5E7A","#C59355","#6B8E7F","#7A6BA8","#B5826E","#4A7A8C","#96593F","#7A4A6B","#5E8A7D","#A86B5E","#6B7A8A"];
function chantierColor(name) {
  if (!name) return "#A8908E";
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
  return CHANTIER_PALETTE[Math.abs(hash) % CHANTIER_PALETTE.length];
}
 
const api = {
  list: () => fetch("/api/notion", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({action: "list"}) }).then(r => r.json()),
  update: (id, patch) => fetch("/api/notion", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({action: "update", id, patch}) }).then(r => r.json()),
  create: (action) => fetch("/api/notion", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({action: "create", action})}).then(r => r.json()),
  delete: (id) => fetch("/api/notion", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({action: "delete", id}) }).then(r => r.json()),
};
 
function getMondayISO() {
  const d = new Date(); const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d.setDate(diff));
  return mon.toISOString().slice(0,10);
}
function todayFR() {
  const d = new Date();
  const jours = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const mois = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(LOCAL_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.weekStart !== getMondayISO()) { s.today = []; s.standupSel = []; s.weekStart = getMondayISO(); }
      return s;
    }
  } catch(e) {}
  return { today: [], weekNote: "", standupSel: [], activeTab: "week", filter: "all", weekStart: getMondayISO() };
}
function saveLocal(s) { try { localStorage.setItem(LOCAL_KEY, JSON.stringify(s)); } catch(e) {} }
 
function Check({ done, onClick }) {
  return (
    <button className={"check" + (done ? " done" : "")} onClick={onClick}>
      <svg viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.5 9L10 3" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
    </button>
  );
}
 
function RepartitionBloc({ actions }) {
  const open = actions.filter(a => a.status !== "Fait");
  const counts = { acquisition:0, conversion:0, produit:0, fondation:0 };
  open.forEach(a => counts[a.pillar]++);
  const total = open.length || 1;
  const pcts = {}; PILIER_ORDER.forEach(p => pcts[p] = Math.round(counts[p] / total * 100));
  const fondAlert = counts.fondation > 2;
  return (
    <div className="block">
      <div className="repart-head">
        <div>
          <div className="block-title">Répartition par pilier</div>
          <div className="block-subtitle">Cible : 60–70% Acq+Conv · 20–30% Fondation · 10–20% Produit</div>
        </div>
        <div className="repart-stat"><div className="big">{open.length}</div><div className="lbl">Actions ouvertes</div></div>
      </div>
      <div className="repart-bar">
        {PILIER_ORDER.map(p => counts[p] > 0 && (
          <div key={p} className="repart-bar-seg" style={{width: `${counts[p]/total*100}%`, background: PILIER_META[p].color}} />
        ))}
      </div>
      <div className="repart-legend">
        {PILIER_ORDER.map(p => (
          <div key={p} className={"repart-legend-item" + (p==="fondation" && fondAlert ? " fond-alert-legend" : "")}>
            <div className="repart-legend-dot" style={{background: PILIER_META[p].color}} />
            <span>{PILIER_META[p].name} {counts[p]} · {pcts[p]}%</span>
          </div>
        ))}
      </div>
      {fondAlert && (
        <div className="repart-alert">⚠ {counts.fondation} actions Fondation ouvertes — max 2 par semaine. Priorise ce qui rapproche d'un client dans les 7 jours.</div>
      )}
    </div>
  );
}
 
function Stars({ n }) { return <span className="badge badge-impact">{"⭐".repeat(n)}</span>; }
function Pastilles({ done, total }) {
  let s = ""; for (let i=0;i<total;i++) s += i < done ? "●" : "○";
  return <span className="pastilles">{s}</span>;
}
 
function ChantierBadge({ name, step }) {
  if (!name) return null;
  return (
    <span className="badge badge-chantier" style={{background: chantierColor(name)}} title={step ? `${name} — étape ${step}` : name}>
      <span>{name}</span>
      {step ? <span className="chantier-step">#{step}</span> : null}
    </span>
  );
}
 
function ActionCard({ action, onToggle, onCycle, onRename, onDelete }) {
  const isDone = action.status === "Fait";
  const isRecur = action.recur > 0;
  return (
    <div className={"action-card" + (isDone ? " done" : "")} title={action.name}>
      <Check done={isDone} onClick={() => onToggle(action.id)} />
      <div className="action-name" onDoubleClick={() => onRename(action.id)}>{action.name}</div>
      {action.chantier ? <ChantierBadge name={action.chantier} step={action.step} /> : <span />}
      <span className={"badge badge-pilier " + action.pillar} onClick={() => onCycle(action.id, "pillar")}>{PILIER_META[action.pillar].name}</span>
      <span className="badge badge-type hide-800" onClick={() => onCycle(action.id, "type")}>{action.type}</span>
      {isRecur ? (
        <span className="badge badge-recur"><Pastilles done={action.weekDone} total={action.recur} /><span>{action.weekDone}/{action.recur}</span></span>
      ) : (
        <span className={"badge badge-status hide-800" + (action.status==="Fait" ? " done" : action.status==="En cours" ? " progress" : "")} onClick={() => onCycle(action.id, "status")}>{action.status}</span>
      )}
      <span className={"badge badge-prio " + action.prio.toLowerCase()} onClick={() => onCycle(action.id, "prio")}>{action.prio}</span>
      <Stars n={action.impact} />
      <button className="xbtn" onClick={() => onDelete(action.id)}>×</button>
    </div>
  );
}
 
function ActionList({ actions, ...handlers }) {
  if (!actions.length) return <div className="empty-state">Aucune action dans cette vue.</div>;
  return <div>{actions.map(a => <ActionCard key={a.id} action={a} {...handlers} />)}</div>;
}
 
function ChantierActionRow({ action, onToggle, onRename, onDelete }) {
  const isDone = action.status === "Fait";
  const isRecur = action.recur > 0;
  return (
    <div className={"chantier-action-row" + (isDone ? " done" : "")}>
      <Check done={isDone} onClick={() => onToggle(action.id)} />
      <span className="chantier-step-num">{action.step ? "#" + action.step : ""}</span>
      <div className="action-name-c" onDoubleClick={() => onRename(action.id)} title={action.name}>{action.name}</div>
      {isRecur ? (
        <span className="badge badge-recur"><Pastilles done={action.weekDone} total={action.recur} /><span>{action.weekDone}/{action.recur}</span></span>
      ) : (
        <span className={"badge badge-status" + (isDone ? " done" : action.status==="En cours" ? " progress" : "")}>{action.status}</span>
      )}
      <span className={"badge badge-prio " + action.prio.toLowerCase()}>{action.prio}</span>
      <Stars n={action.impact} />
      <button className="xbtn" onClick={() => onDelete(action.id)}>×</button>
    </div>
  );
}
 
function ChantierBloc({ name, actions, ...handlers }) {
  const total = actions.length;
  const done = actions.filter(a => a.status === "Fait").length;
  const pct = total > 0 ? (done / total * 100) : 0;
  const color = chantierColor(name);
  const sorted = [...actions].sort((a, b) => {
    if (a.status === "Fait" && b.status !== "Fait") return 1;
    if (a.status !== "Fait" && b.status === "Fait") return -1;
    return (a.step ?? 9999) - (b.step ?? 9999);
  });
  return (
    <div className="chantier-block">
      <div className="chantier-head">
        <span className="chantier-badge-big" style={{background: color}}>{name}</span>
        <div className="chantier-progress">
          <div className="chantier-progress-bar"><div className="chantier-progress-fill" style={{width: pct + "%", background: color}} /></div>
          <span>{done}/{total}</span>
        </div>
      </div>
      <div>{sorted.map(a => <ChantierActionRow key={a.id} action={a} {...handlers} />)}</div>
    </div>
  );
}
 
function TodayBloc({ actions, today, onToggle, onRemoveToday }) {
  const items = today.map(id => actions.find(a => a.id === id)).filter(Boolean);
  return (
    <div className="block">
      <div className="block-title">Aujourd'hui</div>
      <div className="block-subtitle">{items.length} / 5 priorités</div>
      <div style={{marginTop: 12}}>
        {items.length === 0 ? (
          <div className="empty-msg">Pas encore de priorité pour aujourd'hui. → Standup picker à droite pour sélectionner jusqu'à 5 actions.</div>
        ) : items.map((a, i) => {
          const isDone = a.status === "Fait";
          return (
            <div key={a.id} className="today-item">
              <span className="today-num">{String(i+1).padStart(2,"0")}</span>
              <Check done={isDone} onClick={() => onToggle(a.id)} />
              <div className="today-name" title={a.name}>{a.name}</div>
              <span className={"badge badge-pilier " + a.pillar}>{PILIER_META[a.pillar].name}</span>
              <button className="xbtn" onClick={() => onRemoveToday(a.id)}>×</button>
            </div>
          );
        })}
      </div>
      <div className="filtre-clarte">Filtre clarté — Est-ce que ça peut me rapprocher d'un client dans les 7 jours ? Si non → Fondation.</div>
    </div>
  );
}
 
function StandupPicker({ actions, today, standupSel, onToggleSel, onAddToToday }) {
  const available = actions.filter(a => a.status !== "Fait" && !today.includes(a.id));
  const grouped = {}; PILIER_ORDER.forEach(p => grouped[p] = []);
  available.forEach(a => grouped[a.pillar].push(a));
  const prioKey = { Haute: 0, Moyenne: 1, Basse: 2 };
  PILIER_ORDER.forEach(p => grouped[p].sort((a,b) => prioKey[a.prio] - prioKey[b.prio] || b.impact - a.impact));
  const roomLeft = 5 - today.length;
  const canAdd = standupSel.length > 0 && roomLeft > 0;
  return (
    <div className="block">
      <div className="block-title">Standup picker</div>
      <div className="block-subtitle">Sélectionner jusqu'à 5 actions pour aujourd'hui</div>
      <div className="standup-body" style={{marginTop: 10}}>
        {PILIER_ORDER.map(p => grouped[p].length > 0 && (
          <div key={p}>
            <div className="standup-group-head">
              <div className="standup-group-dot" style={{background: PILIER_META[p].color}} />
              <div className="standup-group-name">{PILIER_META[p].name}</div>
            </div>
            {grouped[p].map(a => {
              const selected = standupSel.includes(a.id);
              const disabled = !selected && standupSel.length >= 5;
              return (
                <label key={a.id} className="standup-item">
                  <input type="checkbox" checked={selected} disabled={disabled} onChange={() => onToggleSel(a.id)} />
                  <span className="standup-name" title={a.name}>{a.name}</span>
                  <span className={"prio-pill " + a.prio[0]}>{a.prio[0]}</span>
                </label>
              );
            })}
          </div>
        ))}
        {available.length === 0 && <div className="empty-state" style={{padding:"14px 0"}}>Toutes les actions disponibles sont déjà dans Aujourd'hui.</div>}
      </div>
      <div className="standup-footer">
        <div className="standup-counter">{standupSel.length} / 5 sélectionné{standupSel.length>1?"s":""}</div>
        <button className="btn" disabled={!canAdd} onClick={onAddToToday}>
          {standupSel.length > 0 ? `Ajouter ${Math.min(standupSel.length, roomLeft)} à aujourd'hui` : "Ajouter à aujourd'hui"}
        </button>
      </div>
    </div>
  );
}
 
function BriefBloc({ value, onChange }) {
  return (
    <div className="block">
      <div className="block-title">Brief de la semaine</div>
      <div className="block-subtitle">Ce que je veux faire bouger</div>
      <textarea className="brief-area" style={{marginTop: 10}} value={value} onChange={(e) => onChange(e.target.value)} placeholder="Ce que je veux faire bouger cette semaine…" />
    </div>
  );
}
 
function AddForm({ onAdd }) {
  const [name, setName] = useState(""); const [pillar, setPillar] = useState("acquisition");
  const [type, setType] = useState("B2C"); const [prio, setPrio] = useState("Moyenne");
  const [impact, setImpact] = useState(2); const [recur, setRecur] = useState(0);
  const submit = () => {
    if (!name.trim()) return;
    onAdd({ name: name.trim(), pillar, type, prio, impact, recur, status: "À faire", weekDone: 0 });
    setName("");
  };
  return (
    <div className="add-form">
      <input type="text" placeholder="Nouvelle action…" value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} />
      <select value={pillar} onChange={(e) => setPillar(e.target.value)}>
        <option value="acquisition">Acquisition</option><option value="conversion">Conversion</option>
        <option value="produit">Produit</option><option value="fondation">Fondation</option>
      </select>
      <select value={type} onChange={(e) => setType(e.target.value)}><option value="B2C">B2C</option><option value="B2B">B2B</option></select>
      <select value={prio} onChange={(e) => setPrio(e.target.value)}><option value="Haute">Haute</option><option value="Moyenne">Moyenne</option><option value="Basse">Basse</option></select>
      <select value={impact} onChange={(e) => setImpact(+e.target.value)}><option value={1}>⭐</option><option value={2}>⭐⭐</option><option value={3}>⭐⭐⭐</option></select>
      <select value={recur} onChange={(e) => setRecur(+e.target.value)}>
        <option value={0}>Sans récurrence</option><option value={1}>1×/sem</option><option value={3}>3×/sem</option><option value={5}>5×/sem</option>
      </select>
      <button className="btn" onClick={submit}>Ajouter</button>
    </div>
  );
}
 
function App() {
  const [actions, setActions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [syncState, setSyncState] = useState("idle");
  const [local, setLocal] = useState(loadLocal);
  useEffect(() => saveLocal(local), [local]);
 
  const fetchActions = useCallback(async () => {
    setSyncState("syncing");
    try {
      const data = await api.list();
      if (data.error) throw new Error(data.error);
      setActions(data); setError(null); setSyncState("idle");
    } catch(e) {
      setError("Impossible de charger depuis Notion : " + e.message);
      setSyncState("error");
    } finally { setLoading(false); }
  }, []);
  useEffect(() => { fetchActions(); }, [fetchActions]);
 
  // Liste DYNAMIQUE des chantiers, calculée à partir des actions
  const chantiersList = useMemo(() => {
    const set = new Set();
    actions.forEach(a => { if (a.chantier) set.add(a.chantier); });
    return Array.from(set).sort();
  }, [actions]);
 
  const updateLocalAction = (id, patch) => setActions(as => as.map(a => a.id === id ? {...a, ...patch} : a));
 
  const syncUpdate = async (id, patch) => {
    setSyncState("syncing");
    try {
      const res = await api.update(id, patch);
      if (res.error) throw new Error(res.error);
      setSyncState("idle");
    } catch(e) { setSyncState("error"); setError("Sync échouée : " + e.message); }
  };
 
  const toggleDone = async (id) => {
    const a = actions.find(x => x.id === id); if (!a) return;
    if (a.recur > 0) {
      let wd = a.weekDone + 1; if (wd > a.recur) wd = 0;
      updateLocalAction(id, { weekDone: wd });
      syncUpdate(id, { weekDone: wd });
    } else {
      const newStatus = a.status === "Fait" ? "À faire" : "Fait";
      updateLocalAction(id, { status: newStatus });
      if (newStatus === "Fait") setLocal(l => ({...l, today: l.today.filter(i => i !== id), standupSel: l.standupSel.filter(i => i !== id)}));
      syncUpdate(id, { status: newStatus });
    }
  };
 
  const cycleField = (id, field) => {
    const a = actions.find(x => x.id === id); if (!a) return;
    let patch = {};
    if (field === "pillar") patch.pillar = PILIER_ORDER[(PILIER_ORDER.indexOf(a.pillar)+1) % 4];
    if (field === "type") patch.type = a.type === "B2C" ? "B2B" : "B2C";
    if (field === "status") patch.status = { "À faire": "En cours", "En cours": "Fait", "Fait": "À faire" }[a.status];
    if (field === "prio") patch.prio = { Haute: "Moyenne", Moyenne: "Basse", Basse: "Haute" }[a.prio];
    if (field === "impact") patch.impact = a.impact === 3 ? 1 : a.impact + 1;
    updateLocalAction(id, patch); syncUpdate(id, patch);
  };
 
  const renameAction = (id) => {
    const a = actions.find(x => x.id === id); if (!a) return;
    const name = prompt("Renommer l'action :", a.name);
    if (name && name.trim()) { updateLocalAction(id, { name: name.trim() }); syncUpdate(id, { name: name.trim() }); }
  };
 
  const deleteAction = async (id) => {
    if (!confirm("Supprimer définitivement cette action ?")) return;
    setActions(as => as.filter(a => a.id !== id));
    setLocal(l => ({...l, today: l.today.filter(i => i !== id), standupSel: l.standupSel.filter(i => i !== id)}));
    setSyncState("syncing");
    try { await api.delete(id); setSyncState("idle"); }
    catch(e) { setSyncState("error"); setError("Suppression échouée : " + e.message); }
  };
 
  const addAction = async (a) => {
    setSyncState("syncing");
    try {
      const res = await api.create(a);
      if (res.error) throw new Error(res.error);
      setActions(prev => [res, ...prev]); setSyncState("idle");
    } catch(e) { setSyncState("error"); setError("Création échouée : " + e.message); }
  };
 
  const removeFromToday = (id) => setLocal(l => ({...l, today: l.today.filter(i => i !== id)}));
  const toggleStandupSel = (id) => setLocal(l => ({...l, standupSel: l.standupSel.includes(id) ? l.standupSel.filter(i => i !== id) : (l.standupSel.length < 5 ? [...l.standupSel, id] : l.standupSel)}));
  const addToToday = () => setLocal(l => {
    const avail = 5 - l.today.length;
    const toAdd = l.standupSel.slice(0, avail);
    return {...l, today: [...l.today, ...toAdd], standupSel: [], activeTab: "week"};
  });
 
  const filteredActions = useMemo(() => {
    let out = actions; const f = local.filter;
    if (f === "all") out = actions.filter(a => a.status !== "Fait");
    else if (f === "haute") out = actions.filter(a => a.status !== "Fait" && a.prio === "Haute");
    else if (f === "recurrent") out = actions.filter(a => a.status !== "Fait" && a.recur > 0);
    else if (["acquisition","conversion","produit","fondation"].includes(f)) out = actions.filter(a => a.status !== "Fait" && a.pillar === f);
    else if (["B2C","B2B"].includes(f)) out = actions.filter(a => a.status !== "Fait" && a.type === f);
    else if (f === "done") out = actions.filter(a => a.status === "Fait");
    else if (f === "no-chantier") out = actions.filter(a => a.status !== "Fait" && !a.chantier);
    else if (f.startsWith("chantier:")) {
      const c = f.substring("chantier:".length);
      out = actions.filter(a => a.status !== "Fait" && a.chantier === c);
    }
    const prioKey = { Haute: 0, Moyenne: 1, Basse: 2 };
    return [...out].sort((a,b) => prioKey[a.prio] - prioKey[b.prio] || b.impact - a.impact);
  }, [actions, local.filter]);
 
  const handlers = { onToggle: toggleDone, onCycle: cycleField, onRename: renameAction, onDelete: deleteAction };
 
  const pillarView = (p) => {
    const acts = actions.filter(a => a.pillar === p && a.status !== "Fait");
    const prioKey = { Haute: 0, Moyenne: 1, Basse: 2 };
    acts.sort((a,b) => prioKey[a.prio] - prioKey[b.prio] || b.impact - a.impact);
    const all = actions.filter(a => a.pillar === p);
    const stats = {
      open: all.filter(a => a.status !== "Fait").length,
      recur: all.filter(a => a.recur > 0 && a.status !== "Fait").length,
      B2C: all.filter(a => a.type === "B2C" && a.status !== "Fait").length,
      B2B: all.filter(a => a.type === "B2B" && a.status !== "Fait").length,
      done: all.filter(a => a.status === "Fait").length
    };
    return (
      <>
        <div className={"pilier-header " + p}>
          <h2>{PILIER_META[p].name}</h2>
          <p>{PILIER_META[p].desc}</p>
          <div className="pilier-stats">
            <div className="pilier-stat"><strong>{stats.open}</strong>Ouvertes</div>
            <div className="pilier-stat"><strong>{stats.recur}</strong>Récurrentes</div>
            <div className="pilier-stat"><strong>{stats.B2C}</strong>B2C</div>
            <div className="pilier-stat"><strong>{stats.B2B}</strong>B2B</div>
            <div className="pilier-stat"><strong>{stats.done}</strong>Faites</div>
          </div>
        </div>
        <RepartitionBloc actions={actions} />
        <ActionList actions={acts} {...handlers} />
      </>
    );
  };
 
  const chantiersView = () => {
    const byChantier = {}; chantiersList.forEach(c => byChantier[c] = []);
    const orphans = [];
    actions.forEach(a => { if (a.chantier) byChantier[a.chantier]?.push(a); else orphans.push(a); });
    const sorted = [...chantiersList].sort((a, b) => {
      const openA = byChantier[a].filter(x => x.status !== "Fait").length;
      const openB = byChantier[b].filter(x => x.status !== "Fait").length;
      return openB - openA;
    });
    return (
      <>
        <RepartitionBloc actions={actions} />
        {sorted.length === 0 && orphans.length === 0 && (
          <div className="block"><div className="empty-state">Aucune action chargée.</div></div>
        )}
        {sorted.length === 0 && orphans.length > 0 && (
          <div className="block">
            <div className="empty-state">
              Aucun chantier défini pour le moment. Dans Notion, remplis le champ "Chantier" sur tes actions, puis rafraîchis cette page.
            </div>
          </div>
        )}
        {sorted.map(c => <ChantierBloc key={c} name={c} actions={byChantier[c]} {...handlers} />)}
        {orphans.length > 0 && sorted.length > 0 && <ChantierBloc name="Sans chantier" actions={orphans} {...handlers} />}
      </>
    );
  };
 
  const baseFilters = [["all","Toutes ouvertes"],["haute","Haute prio"],["recurrent","Récurrentes"],["done","Fait"]];
  const pillarFilters = [["acquisition","Acquisition"],["conversion","Conversion"],["produit","Produit"],["fondation","Fondation"]];
  const typeFilters = [["B2C","B2C"],["B2B","B2B"]];
 
  const tabs = [["week","Cette semaine"],["open","Toutes les actions"],["chantiers","Chantiers"],["acquisition","Acquisition"],["conversion","Conversion"],["produit","Produit"],["fondation","Fondation"]];
 
  return (
    <div className="app">
      <div className="header">
        <div className="header-left">
          <h1>Dashboard Sophro</h1>
          <div className="subtitle">Cabinet · Paris 11e · Séances & B2B</div>
        </div>
        <div className="header-right">
          <div className="header-date">{todayFR()}</div>
          <div className="sync-status">
            <div className={"sync-dot " + syncState} />
            {syncState === "syncing" ? "Sync Notion…" : syncState === "error" ? "Sync erreur" : "Sync OK"}
          </div>
        </div>
      </div>
 
      {error && <div className="error-banner">{error} <button className="xbtn" onClick={() => setError(null)}>×</button></div>}
 
      <div className="tabs">
        {tabs.map(([k, l]) => (
          <button key={k} className={"tab" + (local.activeTab === k ? " active" : "")} onClick={() => setLocal(s => ({...s, activeTab: k}))}>{l}</button>
        ))}
      </div>
 
      {loading ? <div className="loading-state">Chargement des actions depuis Notion…</div> : (
        <>
          {local.activeTab === "week" && (
            <>
              <RepartitionBloc actions={actions} />
              <div className="week-grid">
                <TodayBloc actions={actions} today={local.today} onToggle={toggleDone} onRemoveToday={removeFromToday} />
                <StandupPicker actions={actions} today={local.today} standupSel={local.standupSel} onToggleSel={toggleStandupSel} onAddToToday={addToToday} />
              </div>
              <BriefBloc value={local.weekNote} onChange={(v) => setLocal(s => ({...s, weekNote: v}))} />
            </>
          )}
          {local.activeTab === "open" && (
            <>
              <RepartitionBloc actions={actions} />
              <div className="block">
                <div className="block-title" style={{marginBottom: 10}}>Ajouter une action</div>
                <AddForm onAdd={addAction} />
                <div className="filters">
                  {baseFilters.map(([k, l]) => (
                    <button key={k} className={"fbtn" + (local.filter === k ? " active" : "")} onClick={() => setLocal(s => ({...s, filter: k}))}>{l}</button>
                  ))}
                </div>
                <div className="filters">
                  <span className="filter-group-label">Par pilier</span>
                  {pillarFilters.map(([k, l]) => (
                    <button key={k} className={"fbtn" + (local.filter === k ? " active" : "")} onClick={() => setLocal(s => ({...s, filter: k}))}>{l}</button>
                  ))}
                  {typeFilters.map(([k, l]) => (
                    <button key={k} className={"fbtn" + (local.filter === k ? " active" : "")} onClick={() => setLocal(s => ({...s, filter: k}))}>{l}</button>
                  ))}
                </div>
                {chantiersList.length > 0 && (
                  <div className="filters">
                    <span className="filter-group-label">Par chantier</span>
                    {chantiersList.map(c => {
                      const k = "chantier:" + c;
                      const isActive = local.filter === k;
                      return (
                        <button key={k} className={"fbtn" + (isActive ? " active" : "")} onClick={() => setLocal(s => ({...s, filter: k}))} style={isActive ? {background: chantierColor(c), borderColor: chantierColor(c)} : {}}>{c}</button>
                      );
                    })}
                    <button className={"fbtn" + (local.filter === "no-chantier" ? " active" : "")} onClick={() => setLocal(s => ({...s, filter: "no-chantier"}))}>Sans chantier</button>
                  </div>
                )}
                <div style={{marginTop: 14}}>
                  <ActionList actions={filteredActions} {...handlers} />
                </div>
              </div>
            </>
          )}
          {local.activeTab === "chantiers" && chantiersView()}
          {PILIER_ORDER.includes(local.activeTab) && pillarView(local.activeTab)}
        </>
      )}
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
